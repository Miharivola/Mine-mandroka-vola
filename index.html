<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandroka Vola - Prédicteur Mines</title>
    <style>
        :root {
            --gold: #f1c40f;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2d2d2d;
            --text-grey: #a0a0a0;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: var(--gold);
            font-size: 1.4rem;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .header p {
            color: var(--text-grey);
            font-size: 0.7rem;
            margin-top: 5px;
        }

        /* Form Inputs */
        .input-section {
            background: var(--input-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .label-text {
            color: var(--text-grey);
            font-size: 0.8rem;
            margin-bottom: 5px;
            display: block;
        }

        .seed-box {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            word-break: break-all;
            border: 1px solid #444;
            margin-bottom: 15px;
            color: #ddd;
        }

        .flex-inputs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .flex-item { flex: 1; }

        input, select {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        /* Predict Button */
        .btn-predict {
            background: var(--gold);
            color: black;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* Grid Section */
        .grid-container {
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .cell {
            aspect-ratio: 1/1;
            background: #333;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            color: #555;
            transition: 0.3s;
        }

        /* Rehefa mipoitra ny kintana */
        .cell.star {
            background: #444;
            color: var(--gold);
            box-shadow: inset 0 0 10px rgba(241, 196, 15, 0.2);
        }

        /* Rehefa mipoitra ny afo (mines) */
        .cell.mine {
            color: #e74c3c;
        }

        .footer-nav {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            color: var(--text-grey);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>✨ Prédicteur Mines</h1>
        <p>Algorithme SHA-256 déterministe</p>
    </div>

    <div class="input-section">
        <span class="label-text">🔗 Seed Serveur</span>
        <div class="seed-box" id="seedBox">iJh41lV10BhkOEwvV92sQf780ZPk...</div>

        <div class="flex-inputs">
            <div class="flex-item">
                <span class="label-text">🕒 Heure dernière partie</span>
                <input type="text" id="timeBox" readonly>
            </div>
            <div class="flex-item">
                <span class="label-text">💣 Nombre de mines</span>
                <select id="mineCount">
                    <option value="3">3 mines</option>
                    <option value="5">5 mines</option>
                    <option value="10">10 mines</option>
                </select>
            </div>
        </div>

        <button class="btn-predict" onclick="runPrediction()">🎯 Prédire les Mines</button>
    </div>

    <div class="grid-container">
        <div class="grid" id="mineGrid">
            </div>
    </div>

    <div class="footer-nav">
        <span>🏠 Accueil</span>
        <span style="color: var(--gold);">🔮 Prédicteur</span>
        <span>📞 Contact</span>
    </div>
</div>

<script>
    // Mamorona ny grid
    const grid = document.getElementById('mineGrid');
    for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.innerText = 'o'; // Marika boribory kely toy ny amin'ny sary
        grid.appendChild(cell);
    }

    // Ora automatique
    function updateTime() {
        const now = new Date();
        document.getElementById('timeBox').value = now.toLocaleTimeString();
    }
    updateTime();

    function runPrediction() {
        const cells = document.querySelectorAll('.cell');
        const btn = document.querySelector('.btn-predict');
        
        // Reset
        cells.forEach(c => {
            c.classList.remove('star', 'mine');
            c.innerText = 'o';
            c.style.background = "#333";
        });

        btn.innerText = "CALCULATING...";
        btn.disabled = true;

        setTimeout(() => {
            // Maka toerana 4 hisian'ny kintana
            let stars = [];
            while(stars.length < 4) {
                let r = Math.floor(Math.random() * 25);
                if(!stars.includes(r)) stars.push(r);
            }

            // Maka toerana 2 hisian'ny afo (mines) ho an'ny sary
            let mines = [];
            while(mines.length < 2) {
                let r = Math.floor(Math.random() * 25);
                if(!stars.includes(r) && !mines.includes(r)) mines.push(r);
            }

            // Asehoy ny kintana
            stars.forEach(idx => {
                cells[idx].classList.add('star');
                cells[idx].innerText = '⭐';
                cells[idx].style.background = "#444";
            });

            // Asehoy ny afo
            mines.forEach(idx => {
                cells[idx].classList.add('mine');
                cells[idx].innerText = '🔥';
            });

            btn.innerText = "PRÉDIRE LES MINES";
            btn.disabled = false;
            updateTime();
        }, 1000);
    }
</script>

</body>
</html>
