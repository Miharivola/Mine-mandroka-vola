<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prédicteur Mines - Full Interactive</title>
    <style>
        :root {
            --gold: #f1c40f;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2d2d2d;
            --text-grey: #a0a0a0;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--gold); font-size: 1.4rem; margin: 0; }
        .header p { color: var(--text-grey); font-size: 0.7rem; }

        .input-section {
            background: var(--input-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .seed-box {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            word-break: break-all;
            border: 1px solid #444;
            margin-bottom: 12px;
            color: #888;
        }

        .btn-predict {
            background: var(--gold);
            color: black;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .grid-container {
            background: #252525;
            padding: 15px;
            border-radius: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        /* Ny kianja tsirairay dia bokotra azo ampidirana zavatra */
        .cell {
            aspect-ratio: 1/1;
            background: #333;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            color: #444;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            outline: none;
            padding: 0;
        }

        /* Rehefa mipoitra ny kintana nampidirinao */
        .cell.active-star {
            background: rgba(241, 196, 15, 0.1);
            color: var(--gold);
            border: 1px solid var(--gold);
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.2);
        }

        /* Rehefa mipoitra ny mine (afo) nampidirinao */
        .cell.active-mine {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .footer-nav {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            color: var(--text-grey);
            font-size: 0.8rem;
        }

        .hint {
            font-size: 0.7rem;
            color: var(--text-grey);
            margin-top: 5px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>✨ Prédicteur Mines</h1>
        <p>Algorithme SHA-256 déterministe (Full Scan)</p>
    </div>

    <div class="input-section">
        <div class="seed-box">Server Seed: iJh41lV10BhkOEwvV92sQf780ZPk...</div>
        <button class="btn-predict" onclick="resetGrid()">🔄 RESET GRID</button>
        <div class="hint">Kitiho ny kianja mba hampidirana kintana</div>
    </div>

    <div class="grid-container">
        <div class="grid" id="mineGrid">
            </div>
    </div>

    <div class="footer-nav">
        <span>🏠 Accueil</span>
        <span style="color: var(--gold);">🔮 Prédicteur</span>
        <span>📞 Contact</span>
    </div>
</div>

<script>
    const grid = document.getElementById('mineGrid');

    // Hamorona kianja 25 azo kitihina mivantana
    for (let i = 0; i < 25; i++) {
        const cell = document.createElement('button');
        cell.classList.add('cell');
        cell.innerText = 'o';
        
        // Rehefa kitihina ny kianja iray dia afaka ampidirana kintana
        cell.onclick = function() {
            if (!this.classList.contains('active-star')) {
                this.classList.add('active-star');
                this.innerText = '⭐';
            } else {
                this.classList.remove('active-star');
                this.innerText = 'o';
            }
        };

        grid.appendChild(cell);
    }

    function resetGrid() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(c => {
            c.classList.remove('active-star', 'active-mine');
            c.innerText = 'o';
        });
    }
</script>

</body>
</html>
