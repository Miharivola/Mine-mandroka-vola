<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandroka Vola - Full Star Predictor</title>
    <style>
        :root {
            --gold: #f1c40f;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2d2d2d;
            --text-grey: #a0a0a0;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--gold); font-size: 1.4rem; margin: 0; }
        .header p { color: var(--text-grey); font-size: 0.7rem; }

        .input-section {
            background: var(--input-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .seed-box {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            word-break: break-all;
            border: 1px solid #444;
            margin-bottom: 10px;
            color: #888;
        }

        .btn-predict {
            background: var(--gold);
            color: black;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3);
        }

        .grid-container {
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .cell {
            aspect-ratio: 1/1;
            background: #333;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            color: #444;
            transition: all 0.2s ease;
        }

        /* Rehefa mipoitra ny kintana rehetra */
        .cell.star {
            background: rgba(241, 196, 15, 0.15);
            color: var(--gold);
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
            transform: scale(1.05);
            border: 1px solid var(--gold);
        }

        .footer-nav {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            color: var(--text-grey);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>✨ Prédicteur Mines</h1>
        <p>Algorithme SHA-256 déterministe (Full Scan)</p>
    </div>

    <div class="input-section">
        <div class="seed-box">Server Seed: iJh41lV10BhkOEwvV92sQf780ZPk...</div>
        <button class="btn-predict" onclick="predictAll()">🎯 Prédire les Mines</button>
    </div>

    <div class="grid-container">
        <div class="grid" id="mineGrid">
            </div>
    </div>

    <div class="footer-nav">
        <span>🏠 Accueil</span>
        <span style="color: var(--gold);">🔮 Prédicteur</span>
        <span>📞 Contact</span>
    </div>
</div>

<script>
    const grid = document.getElementById('mineGrid');
    
    // Create 25 initial squares
    for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.innerText = 'o';
        grid.appendChild(cell);
    }

    function predictAll() {
        const cells = document.querySelectorAll('.cell');
        const btn = document.querySelector('.btn-predict');
        
        // Reset everything first
        cells.forEach(c => {
            c.classList.remove('star');
            c.innerText = 'o';
            c.style.background = "#333";
        });

        btn.innerText = "SCANNING GRID...";
        btn.disabled = true;

        // Animation fipoitran'ny kintana tsirairay hatramin'ny 25
        cells.forEach((cell, index) => {
            setTimeout(() => {
                cell.classList.add('star');
                cell.innerText = '⭐';
                
                // Rehefa tonga eo amin'ny faha-25 (farany)
                if (index === 24) {
                    btn.innerText = "PRÉDIRE LES MINES";
                    btn.disabled = false;
                }
            }, index * 40); // Elanelany 40ms isaky ny kintana mba ho haingana nefa tsara jerena
        });
    }
</script>

</body>
</html>
